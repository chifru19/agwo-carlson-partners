name: "IaC Security Scan (Checkov)"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# FIX: Set global permissions to minimum (Read Only)
permissions: read-all

jobs:
  scan:
    name: Checkov Scan
    runs-on: ubuntu-latest
    env:
      # FIX: Opt into Node.js 24 to resolve deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    permissions:
      contents: read
      security-events: write # Only grant write for security results
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: all
          soft_fail: false 
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload SARIF file
        # FIX: Update CodeQL Action to v4 to resolve deprecation warning
        uses: github/codeql-action/upload-sarif@v4
        if: success() || failure()
        with:
          sarif_file: results.sarif
